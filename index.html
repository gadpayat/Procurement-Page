<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PCRP/KKB-CDD Premium</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --a: #0d47a1;
            --b: #00897b;
            --bg: rgba(255, 255, 255, .15);
            --txt: #fff;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: transparent;
            color: var(--txt);
        }

        .dark {
            background: #0f172a;
        }

        .light {
            color: #222;
        }

        .wrap {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .glass {
            background: var(--bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, .2);
            border-radius: 16px;
            padding: 16px;
        }

        button,
        .acc {
            width: 100%;
            padding: 14px;
            margin: 6px 0;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, var(--a), var(--b));
            color: white;
            cursor: pointer;
        }

        .panel {
            display: none;
            padding-left: 18px;
            animation: fade .25s;
        }

        @keyframes fade {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            font-size: 11px;
            font-style: italic;
            margin: 20px;
        }
    </style>

</head>

<body class="dark">

    <div class="wrap">

        <div class="top glass">
            <div>
                <b>Home</b> › Procurement › Supply & Delivery
            </div>

            <button style="width:auto"
                onclick="document.body.classList.toggle('light');document.body.classList.toggle('dark')">
                🌙 / ☀
            </button>
        </div>

        <div class="glass">
            <h2>
                <i class="fa-solid fa-box"></i>
                PCRP / KKB-CDD Procurement Dashboard
            </h2>

            <input id="s" placeholder="Search links...">
        </div>

        <div id="root"></div>

        <footer>
            ©2026 PCRP/KKB-CDD • Professional Procurement Portal • Replace placeholder links with your own.
        </footer>

    </div>

    <script>
        const cfg = [
            ['Supply Planning', 4],
            ['Delivery Monitoring', 4],
            [
                'Procurement Docs',
                [
                    ['BAC Documents', 6],
                    ['Supplier Files', 3]
                ]
            ],
            [
                'Archives',
                [
                    ['Completed Projects', 12],
                    ['Reference Forms', 5]
                ]
            ]
        ];

        const r = document.getElementById('root');

        function mk(t, c = 'acc') {
            let b = document.createElement('button');
            b.className = c;
            b.innerHTML = '<i class="fa-solid fa-box"></i> ' + t;
            return b;
        }

        cfg.forEach(x => {

            let b = mk(x[0]);
            let p = document.createElement('div');

            p.className = 'panel';

            b.onclick = () =>
                p.style.display =
                p.style.display === 'block'
                    ? 'none'
                    : 'block';

            r.append(b, p);

            if (Number.isInteger(x[1])) {

                for (let i = 1; i <= x[1]; i++) {

                    let s = mk('Link ' + i);

                    s.onclick = () =>
                        open('https://example.com', '_blank');

                    p.append(s);
                }

            } else {

                x[1].forEach(g => {

                    let gb = mk(g[0]);
                    let gp = document.createElement('div');

                    gp.className = 'panel';

                    gb.onclick = () =>
                        gp.style.display =
                        gp.style.display === 'block'
                            ? 'none'
                            : 'block';

                    p.append(gb, gp);

                    for (let i = 1; i <= g[1]; i++) {

                        let l = mk(g[0] + ' ' + i);

                        l.onclick = () =>
                            open('https://example.com', '_blank');

                        gp.append(l);
                    }

                });

            }

        });

        s.oninput = e => {

            document
                .querySelectorAll('button.acc')
                .forEach(b => {

                    b.style.display =
                        b.textContent
                            .toLowerCase()
                            .includes(e.target.value.toLowerCase())
                            ? ''
                            : 'none';

                });

        };
    </script>

</body>

</html>
