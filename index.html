<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Procurement Portal</title>

    <style>
        body {
            margin: 0;
            background: transparent;
            font-family: Arial, sans-serif;
        }

        .wrap {
            display: grid;
            grid-template-columns: repeat(2, 300px);
            justify-content: center;
            gap: 22px;
            padding: 20px;
        }

        .folder {
            position: relative;
            width: 300px;
        }

        .tab {
            position: absolute;
            top: 0;
            left: 38%;
            width: 70px;
            height: 22px;
            background: #f6dfbf;
            border-radius: 0 0 6px 6px;
        }

        .main {
    margin-top: 18px;
    width: 100%;
    height: 145px;
    border: none;
    border-radius: 14px;

    /* Original Golden Blue Color */
    background: linear-gradient(
    90deg,
    #04131F 0%,
    #03334D 12%,
    #09577C 24%,
    #0079AD 38%,
    #00D4FF 50%,
    #0079AD 62%,
    #09577C 76%,
    #03334D 88%,
    #04131F 100%
);

    color: white;
    font-size: 22px;
    font-weight: bold;

    cursor: pointer;
    overflow: hidden;
    position: relative;

    /* Glass Effect */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,.35);

    /* Original shadow + Glow */
    box-shadow:
        0 12px 20px rgba(0,0,0,.25),
        inset 0 1px 1px rgba(255,255,255,.55),
        inset 0 -2px 4px rgba(0,0,0,.12),
        0 0 18px rgba(255,230,170,.35);

    animation: float 3s ease-in-out infinite;
    transition: all .35s ease;
}

/* Glass Reflection */
.main::before{
    content:"";
    position:absolute;
    top:2px;
    left:2px;
    right:2px;
    height:45%;

    border-radius:12px 12px 45px 45px;

    background:linear-gradient(
        to bottom,
        rgba(255,255,255,.55),
        rgba(255,255,255,.18),
        transparent
    );

    pointer-events:none;
}

.main::after{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:14px;

    background:linear-gradient(
        135deg,
        rgba(255,255,255,.25),
        transparent 40%,
        rgba(255,255,255,.08)
    );

    opacity:.7;
    pointer-events:none;
}

.main:hover{

    transform:translateY(-8px) scale(1.03);

    box-shadow:
        0 18px 28px rgba(0,0,0,.30),
        inset 0 2px 2px rgba(255,255,255,.6),
        inset 0 -2px 4px rgba(0,0,0,.15),
        0 0 28px rgba(255,235,180,.65);
}

.main span.shine{
    position:absolute;
    top:-60%;
    left:-35%;
    width:35%;
    height:220%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.45),
        transparent
    );

    transform:rotate(25deg);
    animation:shine 5s linear infinite;
}

@keyframes shine{

    0%{
        left:-40%;
    }

    100%{
        left:140%;
    }

}
        
        @keyframes float {
            50% {
                transform: translateY(-6px);
            }
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            background: rgba(255, 255, 255, .5);
            animation: ripple .6s linear;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .panel {
            display: none;
            margin-top: 8px;
            padding: 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .87);
        }

        .panel.open {
            display: block;
        }

        .sub {
            display: block;
            width: 100%;
            margin: 4px 0;
            padding: 8px;
            cursor: pointer;
        }

        .nest {
            display: none;
            margin-left: 14px;
        }

        .nest.open {
            display: block;
        }

        footer {
            padding: 10px;
            text-align: center;
            font-size: 11px;
            font-style: italic;
            color: #555;
        }
    </style>

</head>

    <script>

        function go(url) {
    if (url) {
        window.open(url, "_blank");
    } else {
        alert("No link has been assigned yet.");
    }
}

        function toggle(id, e) {

            document.querySelectorAll(".panel").forEach(panel => {

                if (panel.id === id) {
                    panel.classList.toggle("open");
                } else {
                    panel.classList.remove("open");
                }

            });

            const button = e.currentTarget;
            const ripple = document.createElement("span");

            ripple.className = "ripple";

            const diameter = Math.max(button.clientWidth, button.clientHeight);

            ripple.style.width = diameter + "px";
            ripple.style.height = diameter + "px";

            const rect = button.getBoundingClientRect();

            ripple.style.left = (e.clientX - rect.left - diameter / 2) + "px";
            ripple.style.top = (e.clientY - rect.top - diameter / 2) + "px";

            button.appendChild(ripple);

            setTimeout(() => {
                ripple.remove();
            }, 600);

        }

        function nest(id) {
            document.getElementById(id).classList.toggle("open");
        }

    </script>
