<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procurement Portal</title>

    <style>
        body {
            margin: 0;
            background: transparent;
            font-family: Arial, sans-serif;
        }

        .wrap {
            display: grid;
            grid-template-columns: repeat(2, 300px);
            justify-content: center;
            gap: 22px;
            padding: 20px;
        }

        .folder {
            position: relative;
            width: 300px;
        }

        .tab {
            position: absolute;
            top: 0;
            left: 38%;
            width: 70px;
            height: 22px;
            background: #f6dfbf;
            border-radius: 0 0 6px 6px;
        }

        .main {
    margin-top: 18px;
    width: 100%;
    height: 145px;
    border: none;
    border-radius: 14px;

    /* Original Gold Color */
    background:
        linear-gradient(
        90deg,
        #4d4d04 0%,
        #6c6d08 8%,
        #9a8f00 16%,
        #d4bf00 28%,
        #887f00 38%,
        #fff100 50%,
        #ffe500 55%,
        #9b8b00 66%,
        #726b08 78%,
        #b7ad00 90%,
        #5b5b06 100%
    );

    color: #183153;
    font-size: 22px;
    font-weight: bold;

    cursor: pointer;
    overflow: hidden;
    position: relative;

    /* Glass Effect */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,.35);

    /* Original shadow + Glow */
    box-shadow:
        0 12px 20px rgba(0,0,0,.25),
        inset 0 1px 1px rgba(255,255,255,.55),
        inset 0 -2px 4px rgba(0,0,0,.12),
        0 0 18px rgba(255,230,170,.35);

    animation: float 3s ease-in-out infinite;
    transition: all .35s ease;
}

/* Glass Reflection */
.main::before{
    content:"";
    position:absolute;
    top:2px;
    left:2px;
    right:2px;
    height:45%;

    border-radius:12px 12px 45px 45px;

    background:linear-gradient(
        to bottom,
        rgba(255,255,255,.55),
        rgba(255,255,255,.18),
        transparent
    );

    pointer-events:none;
}

.main::after{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:14px;

    background:linear-gradient(
        135deg,
        rgba(255,255,255,.25),
        transparent 40%,
        rgba(255,255,255,.08)
    );

    opacity:.7;
    pointer-events:none;
}

.main:hover{

    transform:translateY(-8px) scale(1.03);

    box-shadow:
        0 18px 28px rgba(0,0,0,.30),
        inset 0 2px 2px rgba(255,255,255,.6),
        inset 0 -2px 4px rgba(0,0,0,.15),
        0 0 28px rgba(255,235,180,.65);
}

.main span.shine{
    position:absolute;
    top:-60%;
    left:-35%;
    width:35%;
    height:220%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.45),
        transparent
    );

    transform:rotate(25deg);
    animation:shine 5s linear infinite;
}

@keyframes shine{

    0%{
        left:-40%;
    }

    100%{
        left:140%;
    }

}
        
        @keyframes float {
            50% {
                transform: translateY(-6px);
            }
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            background: rgba(255, 255, 255, .5);
            animation: ripple .6s linear;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .panel {
            display: none;
            margin-top: 8px;
            padding: 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .87);
        }

        .panel.open {
            display: block;
        }

        .sub {
            display: block;
            width: 100%;
            margin: 4px 0;
            padding: 8px;
            cursor: pointer;
        }

        .nest {
            display: none;
            margin-left: 14px;
        }

        .nest.open {
            display: block;
        }

        footer {
            padding: 10px;
            text-align: center;
            font-size: 11px;
            font-style: italic;
            color: #555;
        }
    </style>

</head>

<body>

    <div class="wrap">

        <!-- Guidance Memo -->
        <div class="folder">

            <div class="tab"></div>

            <button class="main" onclick="toggle('p',event)">
                <span class="shine"></span>
                📝
                <br><br>
                Guidance Memo
            </button>

            <div class="panel" id="p">

                <button class="sub" onclick="go(https://drive.google.com/drive/folders/1KqW5NA_l7YVbd0rREqBiTkwhbYDekQUU?usp=drive_link)">Procurement Memo</button>
                <button class="sub" onclick="go()">Empty 1</button>
                <button class="sub" onclick="go()">Empty 2</button>
                <button class="sub" onclick="go()">Empty 3</button>

            </div>

        </div>

        <!-- BAC -->
        <div class="folder">

            <div class="tab"></div>

            <button class="main" onclick="toggle('b',event)">
                <span class="shine"></span>
                📋
                <br><br>
                BAC
            </button>

            <div class="panel" id="b">

                <button class="sub" onclick="go()">BAC 1</button>
                <button class="sub" onclick="go()">BAC 2</button>
                <button class="sub" onclick="go()">BAC 3</button>
                <button class="sub" onclick="go()">BAC 4</button>

            </div>

        </div>

        <!-- Contracts -->
        <div class="folder">

            <div class="tab"></div>

            <button class="main" onclick="toggle('c',event)">
                <span class="shine"></span>
                🤝
                <br><br>
                Contracts
            </button>

            <div class="panel" id="c">

                <button class="sub" onclick="nest('c1')">
                    Contract Group 1
                </button>

                <div class="nest" id="c1">

                    <button class="sub" onclick="go()">Item 1</button>
                    <button class="sub" onclick="go()">Item 2</button>
                    <button class="sub" onclick="go()">Item 3</button>
                    <button class="sub" onclick="go()">Item 4</button>
                    <button class="sub" onclick="go()">Item 5</button>
                    <button class="sub" onclick="go()">Item 6</button>

                </div>

                <button class="sub" onclick="nest('c2')">
                    Contract Group 2
                </button>

                <div class="nest" id="c2">

                    <button class="sub" onclick="go()">Item 1</button>
                    <button class="sub" onclick="go()">Item 2</button>
                    <button class="sub" onclick="go()">Item 3</button>

                </div>

            </div>

        </div>

        <!-- Monitoring -->
        <div class="folder">

            <div class="tab"></div>

            <button class="main" onclick="toggle('m',event)">
                <span class="shine"></span>
                🏭
                <br><br>
                Monitoring
            </button>

            <div class="panel" id="m">

                <button class="sub" onclick="nest('m1')">
                    Monitoring A
                </button>

                <div class="nest" id="m1">

                    <button class="sub" onclick="go()">Report 1</button>
                    <button class="sub" onclick="go()">Report 2</button>
                    <button class="sub" onclick="go()">Report 3</button>
                    <button class="sub" onclick="go()">Report 4</button>
                    <button class="sub" onclick="go()">Report 5</button>
                    <button class="sub" onclick="go()">Report 6</button>
                    <button class="sub" onclick="go()">Report 7</button>
                    <button class="sub" onclick="go()">Report 8</button>
                    <button class="sub" onclick="go()">Report 9</button>
                    <button class="sub" onclick="go()">Report 10</button>
                    <button class="sub" onclick="go()">Report 11</button>
                    <button class="sub" onclick="go()">Report 12</button>

                </div>

                <button class="sub" onclick="nest('m2')">
                    Monitoring B
                </button>

                <div class="nest" id="m2">

                    <button class="sub" onclick="go()">Report 1</button>
                    <button class="sub" onclick="go()">Report 2</button>
                    <button class="sub" onclick="go()">Report 3</button>
                    <button class="sub" onclick="go()">Report 4</button>
                    <button class="sub" onclick="go()">Report 5</button>

                </div>

            </div>

        </div>

    </div>

    <footer>
        Procurement Portal Demo • Replace go() URLs with your Google Sheets or other links.
    </footer>

    <script>

        function go() {
            window.open("https://example.com", "_blank");
        }

        function toggle(id, e) {

            document.querySelectorAll(".panel").forEach(panel => {

                if (panel.id === id) {
                    panel.classList.toggle("open");
                } else {
                    panel.classList.remove("open");
                }

            });

            const button = e.currentTarget;
            const ripple = document.createElement("span");

            ripple.className = "ripple";

            const diameter = Math.max(button.clientWidth, button.clientHeight);

            ripple.style.width = diameter + "px";
            ripple.style.height = diameter + "px";

            const rect = button.getBoundingClientRect();

            ripple.style.left = (e.clientX - rect.left - diameter / 2) + "px";
            ripple.style.top = (e.clientY - rect.top - diameter / 2) + "px";

            button.appendChild(ripple);

            setTimeout(() => {
                ripple.remove();
            }, 600);

        }

        function nest(id) {
            document.getElementById(id).classList.toggle("open");
        }

    </script>

</body>

</html>
