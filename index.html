<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCRP / KKB-CDD Portal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: transparent;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin: 6px 0;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #0d47a1, #00796b);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .nested {
            display: none;
            margin-left: 20px;
        }

        .sub button,
        .sub {
            background: #1565c0;
            font-size: 15px;
        }

        .sub2 button,
        .sub2 {
            background: #00897b;
            font-size: 14px;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 11px;
            font-style: italic;
            color: #555;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>📦 PCRP / KKB-CDD Procurement Portal</h2>

        <div id="root"></div>

        <footer>
            © 2026 PCRP / KKB-CDD Portal • Replace placeholder links with your Google Sheets or webpages.
        </footer>

    </div>

    <script>

        const data = [

            {
                name: "📦 Main Button 1",
                subs: [
                    "Sub 1",
                    "Sub 2",
                    "Sub 3",
                    "Sub 4"
                ]
            },

            {
                name: "📦 Main Button 2",
                subs: [
                    "Sub 1",
                    "Sub 2",
                    "Sub 3",
                    "Sub 4"
                ]
            },

            {
                name: "📦 Main Button 3",
                groups: [
                    {
                        name: "Group A",
                        count: 6
                    },
                    {
                        name: "Group B",
                        count: 3
                    }
                ]
            },

            {
                name: "📦 Main Button 4",
                groups: [
                    {
                        name: "Group A",
                        count: 12
                    },
                    {
                        name: "Group B",
                        count: 5
                    }
                ]
            }

        ];

        const root = document.getElementById("root");

        function mkBtn(text, cls = "") {

            const button = document.createElement("button");

            button.textContent = text;

            button.className = cls;

            return button;

        }

        data.forEach(menu => {

            const mainButton = mkBtn(menu.name);

            const container = document.createElement("div");

            container.className = "nested";

            mainButton.onclick = () => {

                container.style.display =
                    container.style.display === "block"
                        ? "none"
                        : "block";

            };

            root.appendChild(mainButton);
            root.appendChild(container);

            if (menu.subs) {

                menu.subs.forEach(sub => {

                    const subButton = mkBtn(sub, "sub");

                    subButton.onclick = () => {

                        window.open(
                            "https://example.com",
                            "_blank"
                        );

                    };

                    container.appendChild(subButton);

                });

            }

            if (menu.groups) {

                menu.groups.forEach(group => {

                    const groupButton = mkBtn(group.name, "sub");

                    const inner = document.createElement("div");

                    inner.className = "nested";

                    groupButton.onclick = () => {

                        inner.style.display =
                            inner.style.display === "block"
                                ? "none"
                                : "block";

                    };

                    container.appendChild(groupButton);
                    container.appendChild(inner);

                    for (let i = 1; i <= group.count; i++) {

                        const linkButton = mkBtn(
                            `${group.name} Link ${i}`,
                            "sub2"
                        );

                        linkButton.onclick = () => {

                            window.open(
                                "https://example.com",
                                "_blank"
                            );

                        };

                        inner.appendChild(linkButton);

                    }

                });

            }

        });

    </script>

</body>

</html>
